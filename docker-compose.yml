version: "3.9"

volumes:
  pgdata:
  sim-data:
  sim-state:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    sc-sim:
     build: ../sc-sim
     command: python -m flowform.cli --continuous 365 30
     volumes:
       - sim-data:/data/output
       - sim-state:/data/state
     environment:
       DATA_DIR: /data/output
       STATE_DIR: /data/state
     depends_on:
       postgres:
         condition: service_healthy

  dagster-webserver:
    build: .
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml
    working_dir: /opt/sc-sim-tools
    ports:
      - "3000:3000"
    volumes:
      - sim-data:/data/sim
      - ./dagster_home:/opt/sc-sim-tools/dagster_home
      - .:/opt/sc-sim-tools
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT:-5432}
      DB_SSL: ${DB_SSL:-disable}
      DATA_DIR: /data/sim
      DAGSTER_HOME: /opt/sc-sim-tools/dagster_home
    depends_on:
      postgres:
        condition: service_healthy

  dagster-daemon:
    build: .
    command: dagster-daemon run -w workspace.yaml
    working_dir: /opt/sc-sim-tools
    volumes:
      - sim-data:/data/sim
      - ./dagster_home:/opt/sc-sim-tools/dagster_home
      - .:/opt/sc-sim-tools
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT:-5432}
      DB_SSL: ${DB_SSL:-disable}
      DATA_DIR: /data/sim
      DAGSTER_HOME: /opt/sc-sim-tools/dagster_home
    depends_on:
      postgres:
        condition: service_healthy
